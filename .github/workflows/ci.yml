name: CI — Test & Promote to Production

on:
  push:
    branches: [dev]

jobs:
  test:
    name: Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Minimal env vars needed for build (no real secrets)
          NEXT_PUBLIC_STEALTH_MODE: 'true'
          NEXT_PUBLIC_SITE_URL: 'www.globepilots.com'
          NEXT_PUBLIC_SUPABASE_URL: 'https://placeholder.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'placeholder'

  promote:
    name: Promote to Production
    needs: test
    runs-on: ubuntu-latest
    # Only auto-promote if tests pass
    if: success()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for breaking changes
        id: check_changes
        run: |
          # Get list of changed files between main and dev
          CHANGED=$(git diff --name-only origin/main...HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          # Check commit message for manual override keywords
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"

          # YOU DECIDE: add [deploy] to auto-promote, [review] to force PR
          #   git commit -m "fix button color [deploy]"    → straight to production
          #   git commit -m "new auth flow [review]"       → creates PR for testing
          #   git commit -m "fix typo"                     → auto-detects based on files

          NEEDS_REVIEW=false

          # [review] in commit message = always create PR
          if echo "$COMMIT_MSG" | grep -qi "\[review\]"; then
            echo "🔒 Manual review requested via [review] tag"
            NEEDS_REVIEW=true
          # [deploy] in commit message = always auto-promote
          elif echo "$COMMIT_MSG" | grep -qi "\[deploy\]"; then
            echo "🚀 Auto-deploy requested via [deploy] tag"
            NEEDS_REVIEW=false
          else
            # No tag — auto-detect based on changed files
            echo "No deploy tag — auto-detecting based on files..."

            if echo "$CHANGED" | grep -q "supabase.*\.sql"; then
              echo "⚠️ Database schema changes"
              NEEDS_REVIEW=true
            fi
            if echo "$CHANGED" | grep -q "package\.json"; then
              echo "⚠️ Dependency changes"
              NEEDS_REVIEW=true
            fi
            if echo "$CHANGED" | grep -q "middleware\.ts"; then
              echo "⚠️ Middleware changes"
              NEEDS_REVIEW=true
            fi
            if echo "$CHANGED" | grep -q "auth"; then
              echo "⚠️ Auth changes"
              NEEDS_REVIEW=true
            fi
            if echo "$CHANGED" | grep -q "\.env"; then
              echo "⚠️ Environment changes"
              NEEDS_REVIEW=true
            fi
          fi

          echo "needs_review=$NEEDS_REVIEW" >> $GITHUB_OUTPUT

          # Count changes for commit message
          FILE_COUNT=$(echo "$CHANGED" | wc -l)
          echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT

      - name: Auto-merge to main (safe changes)
        if: steps.check_changes.outputs.needs_review == 'false'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout main
          git merge origin/dev --no-edit
          git push origin main
          echo "✅ Auto-promoted to production (${{ steps.check_changes.outputs.file_count }} files)"

      - name: Create PR for review (breaking changes)
        if: steps.check_changes.outputs.needs_review == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if PR already exists
          EXISTING_PR=$(gh pr list --base main --head dev --json number --jq '.[0].number')

          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --base main \
              --head dev \
              --title "Deploy to Production" \
              --body "$(cat <<'EOF'
          ## Auto-generated deployment PR

          Tests passed but changes flagged for manual review:

          ${{ steps.check_changes.outputs.needs_review == 'true' && '⚠️ Contains changes to: database schema, dependencies, middleware, auth, or environment' || '✅ Safe changes only' }}

          **Changed files:** ${{ steps.check_changes.outputs.file_count }}

          Review the changes, then merge to deploy to production.
          EOF
          )"
            echo "📋 Created PR for manual review"
          else
            echo "📋 PR #$EXISTING_PR already exists"
          fi
